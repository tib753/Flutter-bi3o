  <style id="critical-css">
    html, body { margin: 0; height: 100%; width: 100%; background-color: #FFFFFF; font-family: 'Roboto', 'Segoe UI', Arial, sans-serif; }
    body.theme-dark { background-color: #111; color: #FFF; }
    .preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: grid; place-items: center; background-color: #FFFFFF; z-index: 5; transition: opacity 0.4s ease, visibility 0.4s ease; }
    .preloader.preloader--hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
    .preloader:empty { display: none !important; }
    .theme-dark .preloader { background: #111; color: #FFF; }
    .preloader-container { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .preloader-img { animation: animloaderimg 3s ease-in-out infinite; }
    .preloader .loader { width: 140px; height: 0.25rem; position: relative; overflow: hidden; background: rgba(0, 0, 0, 0.15); border-radius: 999px; }
    .theme-dark .preloader .loader { background: rgba(255, 255, 255, 0.15); }
    .preloader .loader::after { content: ""; width: 30px; height: 4px; background: #000; position: absolute; top: 0; left: 0; border-radius: 999px; animation: animloader 2s linear infinite; }
    .theme-dark .preloader .loader::after { background: #FFF; }
    @keyframes animloader { 0% { left: 0; transform: translateX(-100%); } 100% { left: 100%; transform: translateX(0); } }
    @keyframes animloaderimg { 0% { transform: translateY(0); } 50% { transform: translateY(-1rem); } 100% { transform: translateY(0); } }
  </style>

      if (skeletonHeader) {

    });
  </script>

  <script>
    if (typeof(Storage) !== "undefined") {
      var itemValue = localStorage.getItem("flutter.6ammart_theme");
      if (itemValue !== null) {
        if (itemValue === "true") {
          document.body.classList.add("theme-dark");
        } else {
          document.body.classList.remove("theme-light");
        }
      }
    }
  </script>

  <script>
    (function replaceInlineSVGs() {
      const svgImages = Array.from(document.querySelectorAll('img.svg'));
      if (!svgImages.length) return;
      const pending = [];
      let rafId = null;
      function flushQueue() {
        rafId = null;
        while (pending.length) {
          const { img, svg } = pending.shift();
          img.replaceWith(svg);
        }
      }
      function scheduleFlush() {
        if (rafId === null) {
          rafId = requestAnimationFrame(flushQueue);
        }
      }
      svgImages.forEach((img) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', img.getAttribute('src'), true);
        xhr.responseType = 'document';
        xhr.onload = function () {
          if (xhr.status === 200 && xhr.response) {
            const svg = xhr.response.querySelector('svg');
            if (!svg) return;
            const imgID = img.getAttribute('id');
            const imgClass = img.getAttribute('class');
            if (imgID) svg.setAttribute('id', imgID);
            if (imgClass) svg.setAttribute('class', imgClass + ' replaced-svg');
            svg.removeAttribute('xmlns:a');
            if (!svg.getAttribute('viewBox') && svg.getAttribute('height') && svg.getAttribute('width')) {
              svg.setAttribute('viewBox', '0 0 ' + svg.getAttribute('height') + ' ' + svg.getAttribute('width'));
            }
            pending.push({ img, svg });
            scheduleFlush();
          }
        };
        xhr.send();
      });
    })();
  </script>

  <script>
    function removePreloader() {
      const preloader = document.querySelector('.preloader');
      if (!preloader || preloader.dataset.removing === 'true') return;

      preloader.dataset.removing = 'true';
      preloader.classList.add('preloader--hidden');

      const cleanup = () => {
        preloader.removeEventListener('transitionend', cleanup);
        if (preloader.parentNode) {
          preloader.parentNode.removeChild(preloader);
        }
      };

      preloader.addEventListener('transitionend', cleanup, { once: true });
      setTimeout(cleanup, 700);
    }
  </script>

  <script>
    window.addEventListener('load', function() {
      setTimeout(() => {
        const preloader = document.querySelector('.preloader');
        if (preloader && preloader.parentNode) {
          console.warn('Fallback: removing preloader بعد 30 ثانية');
          removePreloader();
        }
      }, 30000);
    });
  </script>
